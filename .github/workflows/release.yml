name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app
        run: npm run tauri build -- --bundles app

      - name: Package macOS app
        run: |
          LABEL="${GITHUB_REF_NAME}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            LABEL="latest"
          fi
          ARCH="$(uname -m)"
          ditto -c -k --sequesterRsrc --keepParent \
            "src-tauri/target/release/bundle/macos/상권스카우트.app" \
            "sanggwon-scout-${LABEL}-macos-${ARCH}.app.zip"

      - name: Upload macOS release asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: sanggwon-scout-${{ github.ref_name }}-macos-*.app.zip

      - name: Upload macOS workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sanggwon-scout-macos
          path: sanggwon-scout-*-macos-*.app.zip
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run tauri build -- --bundles nsis

      - name: Rename Windows installer
        shell: pwsh
        run: |
          $label = $env:GITHUB_REF_NAME
          if ($env:GITHUB_REF -eq "refs/heads/main") {
            $label = "latest"
          }
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Get-ChildItem src-tauri/target/release/bundle/nsis -Filter *.exe -ErrorAction SilentlyContinue |
            ForEach-Object { Copy-Item $_.FullName "release-assets/sanggwon-scout-$label-windows-x64-setup.exe" }

      - name: Upload Windows release assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release-assets/*

      - name: Upload Windows workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sanggwon-scout-windows
          path: release-assets/*
          if-no-files-found: error

  publish-latest:
    name: Publish latest release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Move latest tag
        run: |
          git tag --force latest "${GITHUB_SHA}"
          git push --force origin latest

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish latest release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: |
            main 브랜치 최신 자동 빌드입니다.

            Commit: ${{ github.sha }}
          prerelease: true
          make_latest: false
          overwrite_files: true
          files: release-assets/**/*
