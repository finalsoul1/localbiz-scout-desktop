name: Build and Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-release-main
  cancel-in-progress: false

jobs:
  prepare-version:
    name: Prepare release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next patch version
        id: version
        shell: bash
        run: |
          LATEST_TAG="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"

          if [ -n "${LATEST_TAG}" ]; then
            CURRENT_VERSION="${LATEST_TAG#v}"
          else
            CURRENT_VERSION="$(node -p "require('./package.json').version")"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT_VERSION}"
          VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Next release: v${VERSION}"

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: prepare-version
    env:
      RELEASE_VERSION: ${{ needs.prepare-version.outputs.version }}
      RELEASE_TAG: ${{ needs.prepare-version.outputs.tag }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Create release config
        run: |
          node -e "require('fs').writeFileSync('release.conf.json', JSON.stringify({ version: process.env.RELEASE_VERSION }))"

      - name: Prepare updater signing key
        shell: bash
        env:
          RAW_TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [[ "${RAW_TAURI_SIGNING_PRIVATE_KEY}" == *"untrusted comment:"* ]]; then
            mkdir -p "${RUNNER_TEMP}/tauri-signing"
            printf '%s' "${RAW_TAURI_SIGNING_PRIVATE_KEY}" > "${RUNNER_TEMP}/tauri-signing/private.key"
            echo "TAURI_SIGNING_PRIVATE_KEY_PATH=${RUNNER_TEMP}/tauri-signing/private.key" >> "${GITHUB_ENV}"
          else
            echo "TAURI_SIGNING_PRIVATE_KEY=${RAW_TAURI_SIGNING_PRIVATE_KEY}" >> "${GITHUB_ENV}"
          fi

      - name: Build macOS app
        run: npm run tauri build -- --bundles app --config release.conf.json

      - name: Package macOS app
        run: |
          ARCH="$(uname -m)"
          mkdir -p release-assets
          ditto -c -k --sequesterRsrc --keepParent \
            "src-tauri/target/release/bundle/macos/상권스카우트.app" \
            "release-assets/sanggwon-scout-${RELEASE_TAG}-macos-${ARCH}.app.zip"
          cp "src-tauri/target/release/bundle/macos/상권스카우트.app.tar.gz" \
            "release-assets/sanggwon-scout-${RELEASE_TAG}-macos-${ARCH}.app.tar.gz"
          cp "src-tauri/target/release/bundle/macos/상권스카우트.app.tar.gz.sig" \
            "release-assets/sanggwon-scout-${RELEASE_TAG}-macos-${ARCH}.app.tar.gz.sig"

      - name: Upload macOS workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sanggwon-scout-${{ needs.prepare-version.outputs.tag }}-macos
          path: release-assets/*
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: prepare-version
    env:
      RELEASE_VERSION: ${{ needs.prepare-version.outputs.version }}
      RELEASE_TAG: ${{ needs.prepare-version.outputs.tag }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Create release config
        run: |
          node -e "require('fs').writeFileSync('release.conf.json', JSON.stringify({ version: process.env.RELEASE_VERSION }))"

      - name: Prepare updater signing key
        shell: pwsh
        env:
          RAW_TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if ($env:RAW_TAURI_SIGNING_PRIVATE_KEY -like "*untrusted comment:*") {
            $keyDir = Join-Path $env:RUNNER_TEMP "tauri-signing"
            $keyPath = Join-Path $keyDir "private.key"
            New-Item -ItemType Directory -Force -Path $keyDir | Out-Null
            Set-Content -Path $keyPath -Value $env:RAW_TAURI_SIGNING_PRIVATE_KEY -NoNewline
            "TAURI_SIGNING_PRIVATE_KEY_PATH=$keyPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            "TAURI_SIGNING_PRIVATE_KEY=$env:RAW_TAURI_SIGNING_PRIVATE_KEY" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Build Windows installer
        run: npm run tauri build -- --bundles nsis --config release.conf.json

      - name: Rename Windows installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Get-ChildItem src-tauri/target/release/bundle/nsis -Filter *.exe -ErrorAction SilentlyContinue |
            ForEach-Object { Copy-Item $_.FullName "release-assets/sanggwon-scout-$env:RELEASE_TAG-windows-x64-setup.exe" }
          Get-ChildItem src-tauri/target/release/bundle/nsis -Filter *.exe.sig -ErrorAction SilentlyContinue |
            ForEach-Object { Copy-Item $_.FullName "release-assets/sanggwon-scout-$env:RELEASE_TAG-windows-x64-setup.exe.sig" }

      - name: Upload Windows workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sanggwon-scout-${{ needs.prepare-version.outputs.tag }}-windows
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish versioned release
    runs-on: ubuntu-latest
    needs:
      - prepare-version
      - build-macos
      - build-windows
    env:
      RELEASE_VERSION: ${{ needs.prepare-version.outputs.version }}
      RELEASE_TAG: ${{ needs.prepare-version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create version tag
        run: |
          git tag "${RELEASE_TAG}" "${GITHUB_SHA}"
          git push origin "${RELEASE_TAG}"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create updater manifest
        run: |
          node scripts/create-updater-manifest.mjs \
            --assetsDir=release-assets \
            --repo=${{ github.repository }} \
            --tag="${RELEASE_TAG}" \
            --version="${RELEASE_VERSION}" \
            --notes="${RELEASE_TAG} 자동 배포 버전입니다."

      - name: Publish versioned release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-version.outputs.tag }}
          name: 상권스카우트 ${{ needs.prepare-version.outputs.tag }}
          body: |
            main 브랜치 푸시로 생성된 자동 배포 버전입니다.

            Version: ${{ needs.prepare-version.outputs.version }}
            Commit: ${{ github.sha }}
          prerelease: false
          make_latest: true
          files: release-assets/**/*
